name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Catalog drift-guard (ADR-0042): block deploy if index.html's displayed
      # counts disagree with the actual SKILLS/AGENTS arrays. Canonical-existence
      # of skills is checked locally (scripts/check-catalog-canonical.sh) — the
      # runner has no access to ~/.claude/skills.
      - name: Install check-script dependencies
        # check-catalog.sh uses rg (and fd for the skill-count guardrail when a
        # catalog dir exists) — neither ships on ubuntu runners. Same fix as the
        # bats job in harness-gates.yml. fd is packaged as fd-find (binary fdfind).
        run: |
          sudo apt-get update && sudo apt-get install -y ripgrep fd-find
          sudo ln -sf "$(command -v fdfind)" /usr/local/bin/fd

      - name: Catalog drift-guard (counts)
        run: bash scripts/check-catalog.sh index.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
