name: Harness Gates

on:
  pull_request:
    branches: [main, release]
  push:
    branches: [main, release]

jobs:
  harness-boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check harness/app boundary
        run: bash scripts/check-harness-boundary.sh

  coauthor-trailers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for bot Co-authored-by trailers
        run: python3 scripts/check-coauthor-trailers.py

  harness-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify harness manifest fingerprints
        run: bash scripts/check-harness-manifest.sh

  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats-core + gate-script dependencies
        # skill-validate.sh hard-requires fd + rg (exits 2 without them).
        # Debian packages fd as fd-find with binary name fdfind — symlink it.
        run: |
          sudo apt-get update && sudo apt-get install -y bats ripgrep fd-find
          sudo ln -sf "$(command -v fdfind)" /usr/local/bin/fd
      - name: Run gate script tests
        run: bats tests/
      - name: Check redirects.yaml / composites.md sync
        # Runs in this job because it needs rg (installed above); previously
        # orphaned — the script existed but no CI job or hook invoked it.
        run: bash scripts/check-redirects-sync.sh

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Secret scanning with gitleaks
        uses: gitleaks/gitleaks-action@v2
        # Note: GITLEAKS_LICENSE is only required for some org accounts.
        # Individual and most org repos can omit this. If the action fails on a
        # license check, add the GITLEAKS_LICENSE secret to enable scanning on
        # org plans. For community use, this action requires no license.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check shell scripts with shellcheck
        # Note: shellcheck is preinstalled on GitHub Actions ubuntu runners.
        # This gate checks all hook and script shell files at warning severity.
        run: shellcheck -S warning hooks/*.sh hooks/shared/*.sh scripts/*.sh
